services:
  local-vision:
    image: vllm/vllm-openai:latest
    container_name: local_vision_server
    environment:
      - VLLM_ATTENTION_BACKEND=TORCH_SDPA
    command:
      - --model=Qwen/Qwen2-VL-2B-Instruct
      - --served-model-name=Qwen/Qwen2-VL-2B-Instruct
      - --trust-remote-code
      - --host=0.0.0.0
      - --port=8080
      - --max-model-len=8192
      - --max-num-batched-tokens=8192
      - --gpu-memory-utilization=0.85
      - --enforce-eager
      - --dtype=half
      - --no-enable-prefix-caching
      - --mm-processor-cache-gb=0
      - --limit-mm-per-prompt={"image":4}
    ports:
      - "8118:8080"
    volumes:
      - "${USERPROFILE:-.}/.cache/huggingface:/root/.cache/huggingface"
    restart: "no"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
              count: 1
