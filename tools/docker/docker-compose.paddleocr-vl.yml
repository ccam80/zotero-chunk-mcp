services:
  paddleocr-vl:
    image: vllm/vllm-openai:latest
    container_name: paddleocr_vl_server
    command:
      - --model=PaddlePaddle/PaddleOCR-VL-1.5
      - --served-model-name=PaddleOCR-VL-1.5-0.9B
      - --trust-remote-code
      - --host=0.0.0.0
      - --port=8080
      - --max-model-len=8192
      - --max-num-batched-tokens=8192
      - --gpu-memory-utilization=0.6
      - --enforce-eager
      - --no-enable-prefix-caching
      - --mm-processor-cache-gb=0
    ports:
      - "8118:8080"
    volumes:
      - "${USERPROFILE:-.}/.cache/huggingface:/root/.cache/huggingface"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
              count: 1
