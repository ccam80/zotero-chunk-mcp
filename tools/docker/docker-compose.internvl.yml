services:
  local-vision:
    image: vllm/vllm-openai:latest
    container_name: local_vision_server
    command:
      - --model=OpenGVLab/InternVL2_5-8B
      - --served-model-name=OpenGVLab/InternVL2_5-8B
      - --trust-remote-code
      - --host=0.0.0.0
      - --port=8080
      - --max-model-len=8192
      - --max-num-batched-tokens=8192
      - --gpu-memory-utilization=0.85
      - --enforce-eager
      - --dtype=half
    ports:
      - "8118:8080"
    volumes:
      - "${USERPROFILE:-.}/.cache/huggingface:/root/.cache/huggingface"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
              count: 1
